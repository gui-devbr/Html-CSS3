<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios: color, range and file</title>
</head>
<body>

    <form action="cadastro.php" autocomplete="on">

<p>
<label for="Icor">Cor: </label>
<input type="color" name="Color" id="Icor" value="#00ff00">
</p>


<p>
<label for="Iran">Nivel de prazer:</label>
<input type="range" name="Prazer" id="Iran" value="1" min="1" max="10">
</p>


<p>
    <label for="IFot">Escolha alguma foto:</label>
    <input type="file" name="Foto" id="IFot">
</p>


<p>
    <input type="submit" value="Enviar">
    <input type="reset" value="Limpar">
</p>





    </form>
    
</body>
</html>
